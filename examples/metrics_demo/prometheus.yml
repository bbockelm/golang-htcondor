# Example Prometheus configuration for scraping HTCondor metrics

global:
  scrape_interval: 30s
  evaluation_interval: 30s

scrape_configs:
  # Scrape HTCondor HTTP API server metrics
  - job_name: 'htcondor-api'
    static_configs:
      - targets: ['localhost:8080']
        labels:
          service: 'htcondor-api'
          environment: 'production'

    # Adjust scrape interval based on your needs
    scrape_interval: 30s
    scrape_timeout: 10s

    # Optional: TLS configuration if using HTTPS
    # tls_config:
    #   ca_file: /etc/prometheus/certs/ca.crt
    #   cert_file: /etc/prometheus/certs/client.crt
    #   key_file: /etc/prometheus/certs/client.key

  # If running multiple API servers, list them all
  - job_name: 'htcondor-api-cluster'
    static_configs:
      - targets:
        - 'api1.example.com:8080'
        - 'api2.example.com:8080'
        - 'api3.example.com:8080'
        labels:
          service: 'htcondor-api'
          environment: 'production'

# Example alerting rules (optional)
# rule_files:
#   - 'htcondor_alerts.yml'
