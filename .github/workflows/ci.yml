name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        # Track the minimum Go version named in go.mod (currently 1.25).
        # Add new minor versions here when go.mod's `go` directive moves
        # forward; keep at least one version to exercise the matrix.
        go-version: ['1.25']

    steps:
    - name: Checkout code
      uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

    - name: Set up Go
      uses: actions/setup-go@3041bf56c941b39c61721a86cd11f3bb1338122a # v5.2.0
      with:
        go-version: ${{ matrix.go-version }}
        cache: true

    - name: Install HTCondor
      run: |
        # Add HTCondor APT repository
        wget -qO - https://research.cs.wisc.edu/htcondor/repo/keys/HTCondor-25.x-Key | sudo gpg --dearmor -o /usr/share/keyrings/htcondor-archive-keyring.gpg
        echo "deb [arch=amd64 signed-by=/usr/share/keyrings/htcondor-archive-keyring.gpg] http://research.cs.wisc.edu/htcondor/repo/ubuntu/25.x $(lsb_release -cs) main" | sudo tee /etc/apt/sources.list.d/htcondor.list

        # Update and install HTCondor
        sudo apt-get update
        sudo apt-get install -y condor

    # Multi-module repo (no committed go.work): core at ./, plus ./webapi and
    # ./localcredmon, each building standalone via its `replace ... => ../`.
    # GOWORK=off keeps the result independent of any local workspace.
    - name: Download dependencies
      run: for d in . webapi localcredmon; do (cd "$d" && GOWORK=off go mod download) || exit 1; done

    - name: Verify dependencies
      run: for d in . webapi localcredmon; do (cd "$d" && GOWORK=off go mod verify) || exit 1; done

    - name: Install gotestsum
      run: go install gotest.tools/gotestsum@latest

    - name: Run go vet
      run: make vet

    - name: Run tests
      # Not `make test`: CI needs gotestsum's JUnit output and a coverage profile
      # for Codecov. Core carries the coverage profile; the nested modules run
      # with the race detector.
      run: |
        set -e
        export GOWORK=off
        gotestsum --junitfile=test-results.xml -- -race -coverprofile=coverage.out -covermode=atomic ./...
        (cd webapi && gotestsum --junitfile="$GITHUB_WORKSPACE/test-results-webapi.xml" -- -race ./...)
        (cd localcredmon && gotestsum --junitfile="$GITHUB_WORKSPACE/test-results-localcredmon.xml" -- -race ./...)

    - name: Upload coverage to Codecov
      if: matrix.go-version == '1.25'
      uses: codecov/codecov-action@b9fd7d16f6d7d1b5d2bec1a2887e65ceed900238 # v4.6.0
      with:
        files: ./coverage.out
        flags: unittests
        fail_ci_if_error: false

  lint:
    name: Lint
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Lint each module. `make lint` is the developer equivalent; CI uses the
        # official action (pinned to a commit SHA, with a pinned linter version)
        # for its install/caching, once per module directory.
        module: ['.', 'webapi', 'localcredmon']

    steps:
    - name: Checkout code
      uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

    - name: Set up Go
      uses: actions/setup-go@3041bf56c941b39c61721a86cd11f3bb1338122a # v5.2.0
      with:
        go-version: '1.25'
        cache: true
        cache-dependency-path: ${{ matrix.module }}/go.sum

    - name: Run golangci-lint (${{ matrix.module }})
      uses: golangci/golangci-lint-action@1481404843c368bc19ca9406f87d6e0fc97bdcfd # v7.0.0
      with:
        version: v2.6.1
        working-directory: ${{ matrix.module }}
        args: --timeout=5m
        # Skip `golangci-lint config verify`, which fetches a JSON schema from
        # golangci-lint.run and intermittently times out (flaked Lint jobs on
        # #128/#129). We don't need remote config validation in CI.
        verify: false

  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

    - name: Set up Go
      uses: actions/setup-go@3041bf56c941b39c61721a86cd11f3bb1338122a # v5.2.0
      with:
        go-version: '1.25'
        cache: true

    - name: Build
      run: make build

    - name: Build examples
      run: make examples

  tidy:
    name: Tidy check
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

    - name: Set up Go
      uses: actions/setup-go@3041bf56c941b39c61721a86cd11f3bb1338122a # v5.2.0
      with:
        go-version: '1.25'
        cache: true

    # Fails when a PR leaves any module's go.mod/go.sum stale — notably the
    # examples/* modules, which `replace => ../..` core and so aren't updated by
    # Dependabot's per-module bumps. The failure message points at `make tidy-all`.
    - name: Verify modules are tidy
      run: make tidy-check
