name: Docker Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  docker-test:
    name: Test in Docker (Rocky Linux)
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        platform: [linux/amd64, linux/arm64]
        include:
          - platform: linux/amd64
            tag: amd64
            runner: ubuntu-latest
          - platform: linux/arm64
            tag: arm64
            runner: ubuntu-24.04-arm

    steps:
    - name: Checkout code
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

    - name: Build Docker image
      uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
      with:
        context: .
        platforms: ${{ matrix.platform }}
        load: true
        tags: golang-htcondor:test-${{ matrix.tag }}
        cache-from: type=gha
        cache-to: type=gha,mode=max

    - name: Run tests in Docker
      run: |
        docker run --rm --platform ${{ matrix.platform }} \
          -v ${{ github.workspace }}:/workspace \
          -w /workspace \
          golang-htcondor:test-${{ matrix.tag }} \
          /bin/sh -c "go install gotest.tools/gotestsum@latest && for d in . webapi localcredmon; do (cd \$d && GOWORK=off gotestsum -- -v ./...) || exit 1; done"

    - name: Run build in Docker
      run: |
        docker run --rm --platform ${{ matrix.platform }} \
          -v ${{ github.workspace }}:/workspace \
          -w /workspace \
          golang-htcondor:test-${{ matrix.tag }} \
          /bin/sh -c "git config --global --add safe.directory /workspace && for d in . webapi localcredmon; do (cd \$d && GOWORK=off go build -v ./...) || exit 1; done"

  docker-integration-test:
    name: Integration Test in Docker
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

    - name: Build Docker image
      uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
      with:
        context: .
        platforms: linux/amd64
        load: true
        tags: golang-htcondor:integration-test
        cache-from: type=gha
        cache-to: type=gha,mode=max

    - name: Run integration tests with HTCondor
      run: |
        docker run --rm --privileged \
          -v ${{ github.workspace }}:/workspace \
          -w /workspace \
          golang-htcondor:integration-test \
          /bin/bash -c "
            # Run integration tests (webapi module holds httpserver)
            go install gotest.tools/gotestsum@latest
            cd webapi && GOWORK=off gotestsum -- -tags=integration -timeout=10m ./httpserver/
          "

  docker-verify-env:
    name: Verify Docker Environment
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

    - name: Build Docker image
      run: docker build -t golang-htcondor:verify .

    - name: Verify Go installation
      run: |
        docker run --rm golang-htcondor:verify go version

    - name: Verify HTCondor installation
      run: |
        docker run --rm golang-htcondor:verify condor_version

    - name: Verify development tools
      run: |
        docker run --rm golang-htcondor:verify /bin/bash -c "
          echo 'Checking gopls...'
          gopls version
          echo 'Checking delve...'
          dlv version
          echo 'Checking staticcheck...'
          staticcheck -version
        "

    - name: Test module download
      run: |
        docker run --rm \
          -v ${{ github.workspace }}:/workspace \
          -w /workspace \
          golang-htcondor:verify \
          go mod download
