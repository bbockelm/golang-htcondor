name: Docker Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  docker-test:
    name: Test in Docker (Rocky Linux)
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        platform: [linux/amd64, linux/arm64]
        include:
          - platform: linux/amd64
            tag: amd64
            runner: ubuntu-latest
          - platform: linux/arm64
            tag: arm64
            runner: ubuntu-24.04-arm

    steps:
    - name: Checkout code
      uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3.12.0

    - name: Build Docker image
      uses: docker/build-push-action@ca052bb54ab0790a636c9b5f226502c73d547a25 # v5.4.0
      with:
        context: .
        platforms: ${{ matrix.platform }}
        load: true
        tags: golang-htcondor:test-${{ matrix.tag }}
        cache-from: type=gha
        cache-to: type=gha,mode=max

    - name: Run tests in Docker
      run: |
        docker run --rm --platform ${{ matrix.platform }} \
          -v ${{ github.workspace }}:/workspace \
          -w /workspace \
          golang-htcondor:test-${{ matrix.tag }} \
          /bin/sh -c "go install gotest.tools/gotestsum@latest && for d in . webapi localcredmon; do (cd \$d && GOWORK=off gotestsum -- -v ./...) || exit 1; done"

    - name: Run build in Docker
      run: |
        docker run --rm --platform ${{ matrix.platform }} \
          -v ${{ github.workspace }}:/workspace \
          -w /workspace \
          golang-htcondor:test-${{ matrix.tag }} \
          /bin/sh -c "git config --global --add safe.directory /workspace && for d in . webapi localcredmon; do (cd \$d && GOWORK=off go build -v ./...) || exit 1; done"

  docker-integration-test:
    name: Integration Test in Docker
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3.12.0

    - name: Build Docker image
      uses: docker/build-push-action@ca052bb54ab0790a636c9b5f226502c73d547a25 # v5.4.0
      with:
        context: .
        platforms: linux/amd64
        load: true
        tags: golang-htcondor:integration-test
        cache-from: type=gha
        cache-to: type=gha,mode=max

    - name: Run integration tests with HTCondor
      run: |
        docker run --rm --privileged \
          -v ${{ github.workspace }}:/workspace \
          -w /workspace \
          golang-htcondor:integration-test \
          /bin/bash -c "
            # Run integration tests (webapi module holds httpserver)
            go install gotest.tools/gotestsum@latest
            cd webapi && GOWORK=off gotestsum -- -tags=integration -timeout=10m ./httpserver/
          "

  docker-verify-env:
    name: Verify Docker Environment
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

    - name: Build Docker image
      run: docker build -t golang-htcondor:verify .

    - name: Verify Go installation
      run: |
        docker run --rm golang-htcondor:verify go version

    - name: Verify HTCondor installation
      run: |
        docker run --rm golang-htcondor:verify condor_version

    - name: Verify development tools
      run: |
        docker run --rm golang-htcondor:verify /bin/bash -c "
          echo 'Checking gopls...'
          gopls version
          echo 'Checking delve...'
          dlv version
          echo 'Checking staticcheck...'
          staticcheck -version
        "

    - name: Test module download
      run: |
        docker run --rm \
          -v ${{ github.workspace }}:/workspace \
          -w /workspace \
          golang-htcondor:verify \
          go mod download
